// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.8.0'
        classpath 'com.google.gms:google-services:4.4.0'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Use the Play Services barcode scanner artifact to avoid bundling
    // native ML Kit .so files that are not 16 KB page aligned.
    configurations.all {
        resolutionStrategy.dependencySubstitution {
            substitute module('com.google.mlkit:barcode-scanning') using module('com.google.android.gms:play-services-mlkit-barcode-scanning:18.3.1')
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
